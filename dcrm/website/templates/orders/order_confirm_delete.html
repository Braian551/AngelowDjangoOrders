{% extends 'base.html' %}
{% load static %}

<!-- CSS exclusivo del módulo de pedidos. -->
{% block extra_css %}
<link href="{% static 'css/orders.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}

<section class="orders-page">

    <div class="delete-layout">

        <!-- Tarjeta de confirmación de eliminación. -->
        <div class="delete-card">

            <div class="delete-icon">
                !
            </div>

            <h1>Eliminar pedido</h1>

            <p>
                Esta acción eliminará el pedido
                <strong>{{ order.order_number }}</strong>.
                No podrás deshacer este cambio después.
            </p>

            <form method="post">
                {% csrf_token %}

                <div class="delete-actions">
                    <a href="{% url 'orders' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-danger">
                        Sí, eliminar pedido
                    </button>
                </div>
            </form>

        </div>

    </div>

</section>

{% endblock %}
